<link rel="stylesheet" href="/styles.css" />
<style>
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body { margin: 0; background: var(--bg-letterbox); overflow-x: hidden; }
  #root { min-height: 100vh; }

  /* hero entrance — opacity always 1 (capture/paused-safe); animate transform only */
  .hero-rise { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: no-preference) {
    .hero-rise { animation: tp-rise var(--dur-cine) var(--ease-cine) 0.1s both; }
    @keyframes tp-rise { from { transform: translateY(24px); } to { transform: none; } }
  }
  @keyframes tp-fade { from { opacity: 0; } to { opacity: 1; } }

  /* scroll reveal — transform-only so content is never invisible (capture/print-safe) */
  .reveal { transform: translateY(20px); transition: transform var(--dur-slow) var(--ease-out); will-change: transform; }
  .reveal.in { transform: none; }
  @media (prefers-reduced-motion: reduce) { .reveal { transform: none; } .hero-rise { transform: none; } }

  /* hover niceties */
  .nav-link:hover { color: var(--bone-50) !important; }
  .social-btn:hover { color: var(--bone-50); border-color: var(--border-strong); }
  .scroll-cue { animation: tp-nudge 2.4s var(--ease-in-out) infinite; }
  @keyframes tp-nudge { 0%,100% { transform: translateY(0); opacity: 0.7; } 50% { transform: translateY(4px); opacity: 1; } }

  /* hero wordmark responsive scale (version-independent of bundle) */
  .hero-mark { transform-origin: left center; }
  @media (max-width: 900px) { .hero-mark { transform: scale(0.74); margin-bottom: 8px !important; } }
  @media (max-width: 560px) { .hero-mark { transform: scale(0.52); margin-bottom: 0 !important; } }

  @media (max-width: 720px) {
    .turn-strip { grid-template-columns: 1fr !important; }
    .footer-grid { align-items: flex-start !important; }
  }

  /* ---- mobile polish ---- */
  @media (max-width: 560px) {
    /* declutter the header: drop the secondary text links, keep wordmark + CTA */
    .nav-link { display: none !important; }
    /* stack the email capture so the field + button are full-width, easy to tap */
    .capture-form { flex-direction: column; align-items: stretch !important; }
    .capture-form > * { width: 100% !important; }
  }
</style>
